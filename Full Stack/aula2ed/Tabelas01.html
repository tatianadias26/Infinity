<!DOCTYPE html>
<html>
    <head>
        <title>Tabelas</title>
    </head>

        <table border="5">

                <tr>

                </tr>
            </thead>
            <tbody>
            <tr>
                <th>Cabeçalho 1</th>

            </tr>
            <tr>
                <td>Conteudo 1</td>
                <td>Conteudo 2</td>
                <td rowspan="3">Conteudo 3</td>
            </tr>
            <tr>
                <td>Conteudo 3</td>
                <td>Conteudo 4</td>
            </tr>
            <tr>
                <td>Conteudo 3</td>
                <td>Conteudo 4</td>
            </tr>
            </tbody>
            <tfoot>
                <td colspan="3">Rodapé</td>
            </tfoot>
       </table>
    </body>
</html>
